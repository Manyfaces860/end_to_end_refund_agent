name: Deploy Frontend to GCP

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'

env:
  PROJECT_ID: YOUR_PROJECT_ID_HERE
  GAR_LOCATION: us-central1
  REPOSITORY: worknoon-repo

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Authorize Docker for GCP
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Get Backend URL Output
        id: tf-outputs
        run: |
          echo "BACKEND_URL=$(terraform output -raw backend_url)" >> $GITHUB_OUTPUT
        working-directory: ./terraform

      - name: Build and Push Frontend Image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.tf-outputs.outputs.BACKEND_URL }} \
            -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${{ github.sha }} \
            ./frontend
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${{ github.sha }}

      - name: Terraform Apply (Complete Stack)
        run: |
          terraform apply -auto-approve \
            -var="project_id=${{ env.PROJECT_ID }}" \
            -var="backend_image=placeholder-handled-by-state" \
            -var="frontend_image=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${{ github.sha }}"
        working-directory: ./terraform