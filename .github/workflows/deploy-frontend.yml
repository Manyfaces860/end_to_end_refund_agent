name: Deploy Frontend
on:
  push:
    branches: [ main ]
    paths: [ 'frontend/**' ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
      
      - name: Build and Push
        id: meta
        run: |
          TAG="us-central1-docker.pkg.dev/${{ vars.PROJECT_ID }}/worknoon-repo/frontend:${{ github.sha }}"
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="https://worknoon-backend-${{ vars.PROJECT_ID }}.a.run.app" \
            -t $TAG ./frontend
          docker push $TAG
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  trigger-infra:
    needs: build-frontend
    uses: ./.github/workflows/terraform-apply.yml
    with:
      backend_image: 'use-active-state' # ◄ Tells Terraform to reuse what is already live
      frontend_image: ${{ needs.build-frontend.outputs.tag }}
    secrets: inherit